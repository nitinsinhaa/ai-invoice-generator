# Render Blueprint — single web service serves API + React frontend
# https://dashboard.render.com/blueprints → New Blueprint Instance

databases:
  - name: ai-invoice-db
    plan: free
    databaseName: ai_invoice_db
    user: ai_invoice

services:
  - type: web
    name: ai-invoice-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: chmod +x ../scripts/render-build.sh && ../scripts/render-build.sh
    startCommand: sh -c "npm run migrate && node src/server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-invoice-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 15m
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ai-invoice-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-invoice-api
          envVarKey: RENDER_EXTERNAL_URL
