# Render Blueprint — deploy from GitHub in one click
# Dashboard: https://dashboard.render.com/blueprints → New Blueprint Instance → connect repo

databases:
  - name: ai-invoice-db
    plan: free
    databaseName: ai_invoice_db
    user: ai_invoice

services:
  # Backend API
  - type: web
    name: ai-invoice-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: node src/server.js
    preDeployCommand: npm run migrate
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-invoice-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 15m
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ai-invoice-app
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend (static React app)
  - type: web
    name: ai-invoice-app
    runtime: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-invoice-api
          envVarKey: RENDER_EXTERNAL_URL
