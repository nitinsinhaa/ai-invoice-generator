# Render Blueprint — deploy from GitHub in one click
# Dashboard: https://dashboard.render.com/blueprints → New Blueprint Instance → connect repo

databases:
  - name: ai-invoice-db
    plan: free
    databaseName: ai_invoice_db
    user: ai_invoice

services:
  # Backend API
  - type: web
    name: ai-invoice-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm ci --omit=dev
    startCommand: sh -c "npm run migrate && node src/server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-invoice-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 15m
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ai-invoice-app
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend (static React app) — static sites are free; no plan field
  - type: web
    name: ai-invoice-app
    runtime: static
    rootDir: frontend
    # Must install devDependencies (Vite) — NODE_ENV=production skips them with npm ci
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-invoice-api
          envVarKey: RENDER_EXTERNAL_URL
